<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loay Comida Marroquí</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#faf7f0;
color:#333;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url("https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1400&q=80");
background-size:cover;
background-position:center;
color:white;
text-align:center;
}

h1{
font-size:60px;
}

p{
font-size:22px;
margin:20px;
}

a{
background:#c89b3c;
padding:15px 35px;
border-radius:30px;
color:white;
text-decoration:none;
font-size:20px;
}

section{
padding:60px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

footer{
background:#0b6e4f;
color:white;
padding:20px;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>Loay Comida Marroquí</h1>
<p>Sabores auténticos de Marruecos</p>
<a href="#">Ver Menú</a>
</header>

<section>

<h2>Nuestros Platos</h2>

<div class="cards">

<div class="card">
<h3>🥘 Tajín</h3>
<p>Pollo con limón y aceitunas.</p>
<strong>13,90€</strong>
</div>

<div class="card">
<h3>🍚 Cuscús</h3>
<p>Tradicional con verduras.</p>
<strong>14,90€</strong>
</div>

<div class="card">
<h3>🍵 Té Moruno</h3>
<p>Té con hierbabuena.</p>
<strong>2,90€</strong>
</div>

</div>

</section>

<footer>

© 2026 Loay Comida Marroquí

</footer>

</body>
</html>
